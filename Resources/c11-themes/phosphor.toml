[identity]
name         = "phosphor"
display_name = "Phosphor"
author       = "Stage 11 Agentics"
version      = "0.01.001"
schema       = 1

# The light-bearer. A clear day chrome: predominantly white, with a
# pale phosphor-green emission and warm light in the accents.
# Self-contained palette; does not inherit from stage11.

[palette]
void         = "#F8FAF6"
surface      = "#FFFFFF"
phosphor     = "#2FAF6F"
phosphorDim  = "#7FC8A0"
filament     = "#D9E8DD"
sunlight     = "#E4C66A"
text         = "#18231E"
textDim      = "#617168"

[variables]
background          = "$palette.void"
surface             = "$palette.surface"
foreground          = "$palette.text"
foregroundSecondary = "$palette.textDim"
accent              = "$palette.phosphor"
accentDim           = "$palette.phosphorDim"
separator           = "$palette.filament"
workspaceColor      = "$workspaceColor"
ghosttyBackground   = "$ghosttyBackground"

[chrome.windowFrame]
color            = "$workspaceColor"
thicknessPt      = 1.5
inactiveOpacity  = 0.18
unfocusedOpacity = 0.42

[chrome.sidebar]
tintOverlay                   = "$accent.opacity(0.05)"
tintBase                      = "$background"
tintBaseOpacity               = 0.58
activeTabFill                 = "$workspaceColor"
activeTabFillFallback         = "$surface"
activeTabRail                 = "$accent"
activeTabRailFallback         = "$palette.sunlight"
activeTabRailOpacity          = 0.82
inactiveTabCustomOpacity      = 0.48
inactiveTabMultiSelectOpacity = 0.24
badgeFill                     = "$palette.sunlight"
borderLeading                 = "$separator"

[chrome.dividers]
color       = "$separator.mix($background, 0.35)"
thicknessPt = 1.0

[chrome.titleBar]
background          = "$surface"
backgroundOpacity   = 0.94
foreground          = "$foreground"
foregroundSecondary = "$foregroundSecondary"
borderBottom        = "$separator"

[chrome.tabBar]
background       = "$background"
activeFill       = "$surface.mix($accent, 0.06)"
divider          = "$separator"
activeIndicator  = "$accent"

[chrome.browserChrome]
background   = "$background"
omnibarFill  = "$surface.mix($background, 0.35)"

[chrome.markdownChrome]
background = "$background"

[behavior]
animateWorkspaceCrossfade = false
